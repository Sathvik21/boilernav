<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BoilerNav — Admin Review</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Roboto',Arial,sans-serif;background:#f1f3f4;color:#202124;padding:20px;max-width:820px;margin:0 auto}
  h1{font-size:22px;margin-bottom:4px}.sub{color:#5f6368;font-size:14px;margin-bottom:18px}
  .bar{display:flex;gap:8px;margin-bottom:18px}
  .bar input{flex:1;height:42px;border:1px solid #dadce0;border-radius:8px;padding:0 14px;font:inherit;font-size:15px}
  .bar button{height:42px;padding:0 18px;border:none;border-radius:8px;background:#1a73e8;color:#fff;font:inherit;font-weight:500;cursor:pointer}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(60,64,67,.2);margin-bottom:16px;overflow:hidden}
  .card .map{height:220px}
  .card .body{padding:14px 16px}
  .card .who{font-weight:500;font-size:15px}.card .meta{color:#5f6368;font-size:13px;margin:2px 0 8px}
  .tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;color:#fff;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;letter-spacing:.03em}
  .card .note{font-size:14px;margin-bottom:12px}.card .note:empty{display:none}
  .acts{display:flex;gap:8px}
  .acts button{flex:1;height:40px;border:none;border-radius:8px;font:inherit;font-weight:500;cursor:pointer}
  .approve{background:#188038;color:#fff}.reject{background:#fce8e6;color:#c5221f}
  .empty{color:#5f6368;text-align:center;padding:40px 0}
  .err{color:#c5221f;font-size:14px;margin-bottom:12px}.err:empty{display:none}
</style>
</head>
<body>
<h1>🚂 BoilerNav — Admin Review</h1>
<div class="sub">Approve or reject suggested walkway edits. Approving merges them into <code>walkways.json</code>.</div>
<div class="bar">
  <input id="tok" type="password" placeholder="Admin token" autocomplete="off"/>
  <button id="load">Load pending</button>
</div>
<div class="err" id="err"></div>
<div id="list"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let TOKEN='';
const err=document.getElementById('err'), list=document.getElementById('list');

document.getElementById('load').addEventListener('click',load);
document.getElementById('tok').addEventListener('keydown',e=>{if(e.key==='Enter')load();});

async function api(path,method='GET'){
  const res=await fetch(path,{method,headers:{'x-admin-token':TOKEN}});
  if(!res.ok) throw new Error((await res.json().catch(()=>({}))).error||res.status);
  return res.json();
}

async function load(){
  TOKEN=document.getElementById('tok').value.trim(); err.textContent='';
  list.innerHTML='';
  let items;
  try{ items=await api('./api/pending'); }
  catch(e){ err.textContent='Could not load ('+e.message+'). Check the token and that the server is running.'; return; }
  if(!items.length){ list.innerHTML='<div class="empty">No pending suggestions 🎉</div>'; return; }
  items.forEach(render);
}

function render(item){
  const card=document.createElement('div'); card.className='card';
  const mapId='m_'+item.id;
  const nNodes=Object.keys(item.edit.nodes||{}).length, nEdges=(item.edit.edges||[]).length, nDel=(item.deletions||[]).length;
  const isAdd=nEdges>0||nNodes>0, isRem=nDel>0;
  const type=isAdd&&isRem?'add + remove':isRem?'remove':'add';
  const badge=isRem&&!isAdd?'#c5221f':isAdd&&isRem?'#8430ce':'#1a73e8';
  const parts=[];
  if(nEdges) parts.push(`+${nEdges} link${nEdges>1?'s':''}`);
  if(nNodes) parts.push(`${nNodes} node${nNodes>1?'s':''}`);
  if(nDel) parts.push(`\u2212${nDel} removed`);
  const counts=parts.join(' \u00b7 ')||'no changes';
  card.innerHTML=`
    <div class="map" id="${mapId}"></div>
    <div class="body">
      <div class="who">${esc(item.submitter)} <span class="tag" style="background:${badge}">${type}</span></div>
      <div class="meta">${new Date(item.ts).toLocaleString()} \u00b7 ${counts}</div>
      <div class="note">${esc(item.note)}</div>
      <div class="acts">
        <button class="approve">Approve &amp; merge</button>
        <button class="reject">Reject</button>
      </div>
    </div>`;
  list.appendChild(card);

  // mini map of the proposed additions
  const map=L.map(mapId,{zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20}).addTo(map);
  const pts=[];
  (item.edit.edges||[]).forEach(e=>{
    const a=item.edit.nodes[e[0]], b=item.edit.nodes[e[1]];
    if(a&&b){ L.polyline([a,b],{color:'#1a73e8',weight:5}).addTo(map); pts.push(a,b); }
  });
  Object.values(item.edit.nodes||{}).forEach(c=>{ L.circleMarker(c,{radius:5,fillColor:'#1a73e8',color:'#fff',weight:2,fillOpacity:1}).addTo(map); pts.push(c); });
  (item.deletions||[]).forEach(d=>{
    if(d.geom&&d.geom.length){ L.polyline(d.geom,{color:'#ea4335',weight:5,dashArray:'4,5'}).addTo(map); d.geom.forEach(p=>pts.push(p)); }
  });
  if(pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.5)); else map.setView([40.4266,-86.918],15);

  card.querySelector('.approve').addEventListener('click',()=>act(item.id,'approve',card));
  card.querySelector('.reject').addEventListener('click',()=>act(item.id,'reject',card));
}

async function act(id,action,card){
  try{
    await api('./api/pending/'+id+'/'+action,'POST');
    card.style.transition='opacity .25s'; card.style.opacity='0';
    setTimeout(()=>{ card.remove(); if(!list.children.length) list.innerHTML='<div class="empty">No pending suggestions 🎉</div>'; },260);
  }catch(e){ err.textContent='Action failed: '+e.message; }
}
function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
</script>
</body>
</html>
